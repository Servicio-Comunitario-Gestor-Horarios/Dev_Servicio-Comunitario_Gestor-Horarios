name: Reporte de Bug
description: Reportar un error o comportamiento inesperado
title: "[Bug]: "
labels: ["bug", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Antes de reportar
        - [ ] Verifiqué que este bug no haya sido reportado antes
        - [ ] Estoy usando la última versión del proyecto
        - [ ] Probé en la rama `develop` y el bug persiste

  - type: textarea
    id: description
    attributes:
      label: Descripción del Bug
      description: Explica clara y concisamente qué está fallando.
      placeholder: Al hacer X, ocurre Y en lugar de Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para Reproducir
      description: Pasos concretos para replicar el error.
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Scroll hacia '...'
        4. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento Esperado
      description: Qué debería ocurrir si funcionara correctamente.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento Actual
      description: Qué ocurre realmente (incluir mensajes de error si aplica).
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema Operativo
      description: ¿En qué SO ocurre el bug?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Cliente / Agente
      description: ¿Desde dónde estás interactuando con el repo?
      options:
        - gh CLI
        - Web (GitHub.com)
        - Desktop (GitHub Desktop)
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell / Terminal
      description: ¿Qué terminal usás?
      options:
        - bash
        - zsh
        - powershell
        - otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Capturas
      description: Adjuntá logs, screenshots o cualquier evidencia relevante.
      placeholder: Pegá logs o arrastrá capturas aquí...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexto Adicional
      description: Cualquier otro dato que pueda ayudar (versiones, config, etc.).
    validations:
      required: false
