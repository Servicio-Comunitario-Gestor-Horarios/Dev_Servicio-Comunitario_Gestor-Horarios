name: Solicitud de Funcionalidad
description: Sugerir una nueva funcionalidad o mejora significativa para el proyecto
title: "[Feature]: "
labels: ["enhancement", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Antes de solicitar
        - [ ] Verifiqué que esta funcionalidad no haya sido solicitada antes
        - [ ] Revisé las issues existentes y no encontré algo similar
        - [ ] La funcionalidad está alineada con los objetivos del proyecto

  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: ¿Qué necesidad resuelve esta funcionalidad? Describí el problema o carencia actual.
      placeholder: Actualmente no es posible hacer X, lo que causa Y...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución Propuesta
      description: ¿Cómo debería funcionar desde la perspectiva del usuario? Describí el comportamiento esperado.
      placeholder: El sistema debería permitir al usuario hacer X mediante...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Área Afectada
      description: ¿Qué área del proyecto impacta esta solicitud?
      options:
        - area-backend
        - area-frontend
        - area-middleware/qa
        - area-docs
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de Aceptación
      description: Condiciones medibles que debe cumplir esta funcionalidad para considerarse completa.
      placeholder: |
        - [ ] El usuario puede hacer X
        - [ ] El sistema responde con Y en menos de Z segundos
        - [ ] Los datos persisten correctamente en la base de datos
        - [ ] Se manejan correctamente los errores (campo vacío, conexión perdida, etc.)
      render: markdown
    validations:
      required: true

  - type: textarea
    id: tech_context
    attributes:
      label: Contexto Técnico
      description: Referencias de arquitectura, archivos afectados, patrones a seguir. Opcional.
      placeholder: "Módulos involucrados: backend/src/database/, middleware/common/\nReferencia: docs/arquitectura-comunicacion-frontend-backend.md"
    validations:
      required: false

  - type: input
    id: dependencies
    attributes:
      label: Dependencias
      description: "Números de issues de las que depende esta funcionalidad (ej: #5, #12). Opcional."
      placeholder: "#5, #12"
    validations:
      required: false

  - type: dropdown
    id: assignee
    attributes:
      label: Asignado Sugerido
      description: ¿Quién sugerís que trabaje en esto?
      options:
        - Luis
        - Dani
        - Paola
        - Nicole
        - Manuel
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: ¿En qué sprint debería planificarse?
      options:
        - Sprint 2
        - Sprint 3
        - Sprint 4
        - Sprint 5
        - Sprint 6
        - Sprint 7
        - Sprint 8
        - Sprint 9
        - Sprint 10
        - Sprint 11
        - Sprint 12
        - Sprint 13
        - Sin definir
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Otras soluciones o enfoques que hayas considerado y por qué fueron descartados. Opcional.
      placeholder: "Se consideró hacer X de otra forma, pero se descartó porque..."
    validations:
      required: false
