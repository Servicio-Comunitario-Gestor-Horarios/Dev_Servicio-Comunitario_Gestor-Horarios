name: Mejora de Funcionalidad Existente
description: Proponer una mejora, refactor técnico o pulido sobre una funcionalidad existente
title: "[Enhancement]: "
labels: ["enhancement", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Antes de solicitar
        - [ ] Verifiqué que esta mejora no haya sido solicitada antes
        - [ ] Revisé las issues existentes y no encontré algo similar
        - [ ] La mejora está alineada con los objetivos del proyecto

  - type: input
    id: feature
    attributes:
      label: Funcionalidad a Mejorar
      description: ¿Qué funcionalidad existente necesita mejora?
      placeholder: Ej: Login, CRUD de profesores, generación de horarios...
    validations:
      required: true

  - type: textarea
    id: limitation
    attributes:
      label: Limitación Actual
      description: Describí el problema o limitación que tiene la funcionalidad hoy.
      placeholder: Actualmente la funcionalidad X hace Y, pero cuando Z ocurre... 
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Mejora Propuesta
      description: Describí el cambio propuesto y cómo mejora la situación actual.
      placeholder: Se debería cambiar X para que haga Y, lo que permitiría...
    validations:
      required: true

  - type: dropdown
    id: enhancement_type
    attributes:
      label: Tipo de Mejora
      description: ¿Qué tipo de mejora es?
      options:
        - tech-debt
        - refactor
        - performance
        - ux-polish
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Área Afectada
      description: ¿Qué área del proyecto impacta esta mejora?
      options:
        - area-backend
        - area-frontend
        - area-middleware/qa
        - area-docs
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de Aceptación
      description: Condiciones medibles que debe cumplir esta mejora para considerarse completa.
      placeholder: |
        - [ ] El rendimiento mejora un X%
        - [ ] El código refactorizado pasa los tests existentes
        - [ ] La UX es consistente con el resto de la aplicación
      render: markdown
    validations:
      required: true

  - type: textarea
    id: tech_context
    attributes:
      label: Contexto Técnico
      description: Referencias de arquitectura, archivos afectados, patrones a seguir. Opcional.
      placeholder: "Archivos involucrados: backend/src/database/..."
    validations:
      required: false

  - type: dropdown
    id: assignee
    attributes:
      label: Asignado Sugerido
      description: ¿Quién sugerís que trabaje en esto?
      options:
        - Luis
        - Dani
        - Paola
        - Nicole
        - Manuel
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: Sprint
      description: ¿En qué sprint debería planificarse?
      options:
        - Sprint 2
        - Sprint 3
        - Sprint 4
        - Sprint 5
        - Sprint 6
        - Sprint 7
        - Sprint 8
        - Sprint 9
        - Sprint 10
        - Sprint 11
        - Sprint 12
        - Sprint 13
        - Sin definir
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Otras soluciones o enfoques que hayas considerado. Opcional.
      placeholder: "Se consideró no hacer nada, pero..."
    validations:
      required: false
