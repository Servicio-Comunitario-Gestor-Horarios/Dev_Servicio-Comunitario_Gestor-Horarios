name: Project Board Auto-add

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Servicio-Comunitario-Gestor-Horarios/projects/1
          github-token: ${{ secrets.GH_PROJECT_TOKEN }}
